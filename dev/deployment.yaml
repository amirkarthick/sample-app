apiVersion: apps/v1
kind: Deployment
metadata:
  name: development-deployment
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: development-deployment
  template:
    metadata:
      labels:
        app: development-deployment
    spec:
      containers:
      - name: development
        image: us-east4-docker.pkg.dev/qwiklabs-gcp-03-52cd18060510/my-repository/sample-app:v1.0
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: dev-deployment-service
  namespace: dev
spec:
  type: LoadBalancer
  selector:
    app: development-deployment
  ports:
  - port: 8080
    targetPort: 8080
